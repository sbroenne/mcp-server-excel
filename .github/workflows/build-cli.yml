name: Build CLI

permissions:
  contents: read

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/ExcelMcp.CLI/**'
      - 'src/ExcelMcp.Core/**'
      - 'src/ExcelMcp.ComInterop/**'
      - 'tests/ExcelMcp.CLI.Tests/**'
      - 'tests/ExcelMcp.Core.Tests/**'
      - 'tests/ExcelMcp.ComInterop.Tests/**'
      - 'global.json'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - '.github/workflows/build-cli.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/ExcelMcp.CLI/**'
      - 'src/ExcelMcp.Core/**'
      - 'src/ExcelMcp.ComInterop/**'
      - 'tests/ExcelMcp.CLI.Tests/**'
      - 'tests/ExcelMcp.Core.Tests/**'
      - 'tests/ExcelMcp.Diagnostics.Tests/**'
      - 'tests/ExcelMcp.ComInterop.Tests/**'
      - 'global.json'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - '.github/workflows/build-cli.yml'

jobs:
  build-cli:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v5

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore src/ExcelMcp.CLI/ExcelMcp.CLI.csproj

    - name: Build CLI
      run: dotnet build src/ExcelMcp.CLI/ExcelMcp.CLI.csproj --no-restore --configuration Release

    - name: Verify Core Commands Coverage
      run: |
        Write-Output "🔍 Verifying Core Commands coverage..."
        & scripts/audit-core-coverage.ps1 -FailOnGaps
        if ($LASTEXITCODE -ne 0) {
          Write-Error "❌ Coverage gaps detected! All Core methods must be exposed via MCP Server."
          exit 1
        }
        Write-Output "✅ Coverage audit passed - 100% coverage maintained"
      shell: pwsh

    - name: Verify CLI build
      run: |
        # Check excelcli main executable
        if (Test-Path "src/ExcelMcp.CLI/bin/Release/net10.0-windows/excelcli.exe") {
          Write-Output "✅ excelcli.exe built successfully"
          $version = (Get-Item "src/ExcelMcp.CLI/bin/Release/net10.0-windows/excelcli.exe").VersionInfo.FileVersion
          Write-Output "Version: $version"

          # Test CLI help command (safe - no Excel COM required)
          $helpOutput = & "src/ExcelMcp.CLI/bin/Release/net10.0-windows/excelcli.exe" --help 2>&1
          $exitCode = $LASTEXITCODE

          if ($exitCode -eq 0) {
            Write-Output "✅ CLI help command working (exit code: 0)"
            Write-Output "📋 Help output preview:"
            $helpOutput | Select-Object -First 5 | ForEach-Object { Write-Output "  $_" }
          } else {
            Write-Error "❌ CLI help command failed with exit code: $exitCode"
            Write-Output "Full output:"
            $helpOutput | ForEach-Object { Write-Output "  $_" }
            exit 1
          }
        } else {
          Write-Error "❌ excelcli.exe not found"
          exit 1
        }

        Write-Output "🔧 CLI tool ready for direct automation"
      shell: pwsh

    - name: Test CLI (requires Excel)
      run: |
        Write-Output "ℹ️ Note: CLI tests skipped in CI - they require Microsoft Excel"
        Write-Output "   Run 'dotnet test tests/ExcelMcp.CLI.Tests/' locally with Excel installed"
      shell: pwsh

    - name: Upload CLI build artifacts
      uses: actions/upload-artifact@v6
      with:
        name: ExcelMcp-CLI-${{ github.sha }}
        path: src/ExcelMcp.CLI/bin/Release/net10.0-windows/
