name: Excel Integration Tests

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: excel-integration-tests
  cancel-in-progress: false

env:
  AZURE_RESOURCE_GROUP: rg-excel-runner
  AZURE_VM_NAME: vm-excel-runner

jobs:
  start-runner:
    name: Start Excel runner
    runs-on: ubuntu-latest
    outputs:
      shutdown-time: ${{ steps.watchdog.outputs.shutdown-time }}
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Start VM
        run: az vm start --resource-group "$AZURE_RESOURCE_GROUP" --name "$AZURE_VM_NAME"

      - name: Set three-hour shutdown watchdog
        id: watchdog
        shell: pwsh
        run: |
          $shutdownTime = (Get-Date).ToUniversalTime().AddHours(3).ToString("HHmm")
          az vm auto-shutdown `
            --resource-group $env:AZURE_RESOURCE_GROUP `
            --name $env:AZURE_VM_NAME `
            --time $shutdownTime
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to set the VM auto-shutdown watchdog."
          }
          "shutdown-time=$shutdownTime" >> $env:GITHUB_OUTPUT
          Write-Host "VM watchdog set for $shutdownTime UTC."

  integration-tests:
    name: Run Excel integration tests
    needs: start-runner
    runs-on: [self-hosted, windows, excel]
    timeout-minutes: 180
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
      DOTNET_NOLOGO: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Verify Excel COM
        shell: pwsh
        run: |
          $excel = $null
          try {
            $excel = New-Object -ComObject Excel.Application
            Write-Host "Excel version: $($excel.Version)"
          }
          finally {
            if ($null -ne $excel) {
              $excel.Quit()
              [void][Runtime.InteropServices.Marshal]::FinalReleaseComObject($excel)
            }
          }

      - name: Restore
        run: dotnet restore Sbroenne.ExcelMcp.sln

      - name: Build
        run: dotnet build Sbroenne.ExcelMcp.sln --configuration Release --no-restore

      - name: Run ComInterop integration tests
        run: >-
          dotnet test tests/ExcelMcp.ComInterop.Tests/ExcelMcp.ComInterop.Tests.csproj
          --configuration Release --no-build
          --filter "Category=Integration&RunType!=OnDemand"
          --logger "trx;LogFileName=cominterop-integration.trx"
          --blame-hang-timeout 15m
          -- RunConfiguration.MaxCpuCount=1

      - name: Run Core integration tests
        shell: pwsh
        run: |
          $project = "tests/ExcelMcp.Core.Tests/ExcelMcp.Core.Tests.csproj"
          $baseFilter = "Category=Integration&RunType!=OnDemand"
          $testList = dotnet test $project `
            --configuration Release `
            --no-build `
            --list-tests `
            --filter $baseFilter `
            --nologo
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to discover Core integration tests."
          }

          $testClasses = $testList |
            Where-Object { $_ -match '^\s+Sbroenne\.' } |
            ForEach-Object {
              $testName = ($_.Trim() -split '\(')[0]
              $testName.Substring(0, $testName.LastIndexOf('.'))
            } |
            Sort-Object -Unique

          if ($testClasses.Count -eq 0) {
            throw "Core integration test discovery returned no test classes."
          }

          Write-Host "Running Core integration tests in $($testClasses.Count) isolated test classes."
          for ($index = 0; $index -lt $testClasses.Count; $index++) {
            $testClass = $testClasses[$index]
            $className = $testClass.Split('.')[-1]
            $logFile = "core-{0:D2}-{1}.trx" -f ($index + 1), $className
            Write-Host "[$($index + 1)/$($testClasses.Count)] $testClass"

            dotnet test $project `
              --configuration Release `
              --no-build `
              --filter "FullyQualifiedName~$testClass&$baseFilter" `
              --logger "trx;LogFileName=$logFile" `
              --blame-hang-timeout 15m `
              --nologo `
              -- RunConfiguration.MaxCpuCount=1
            $testExitCode = $LASTEXITCODE

            Get-Process Excel -ErrorAction SilentlyContinue |
              ForEach-Object { Stop-Process -Id $_.Id -Force }

            if ($testExitCode -ne 0) {
              throw "Core integration tests failed for $testClass."
            }
          }

      - name: Run MCP Server integration tests
        run: >-
          dotnet test tests/ExcelMcp.McpServer.Tests/ExcelMcp.McpServer.Tests.csproj
          --configuration Release --no-build
          --filter "Category=Integration&RunType!=OnDemand"
          --logger "trx;LogFileName=mcp-integration.trx"
          --blame-hang-timeout 15m
          -- RunConfiguration.MaxCpuCount=1

      - name: Run CLI integration tests
        run: >-
          dotnet test tests/ExcelMcp.CLI.Tests/ExcelMcp.CLI.Tests.csproj
          --configuration Release --no-build
          --filter "Category=Integration&RunType!=OnDemand"
          --logger "trx;LogFileName=cli-integration.trx"
          --blame-hang-timeout 15m
          -- RunConfiguration.MaxCpuCount=1

      - name: Run OnDemand session tests
        shell: pwsh
        run: |
          $projects = @(
            "tests/ExcelMcp.ComInterop.Tests/ExcelMcp.ComInterop.Tests.csproj",
            "tests/ExcelMcp.Core.Tests/ExcelMcp.Core.Tests.csproj",
            "tests/ExcelMcp.McpServer.Tests/ExcelMcp.McpServer.Tests.csproj",
            "tests/ExcelMcp.CLI.Tests/ExcelMcp.CLI.Tests.csproj"
          )

          foreach ($project in $projects) {
            $name = [IO.Path]::GetFileNameWithoutExtension($project)
            dotnet test $project `
              --configuration Release `
              --no-build `
              --filter "RunType=OnDemand" `
              --logger "trx;LogFileName=$name-ondemand.trx" `
              --blame-hang-timeout 15m `
              -- RunConfiguration.MaxCpuCount=1
            if ($LASTEXITCODE -ne 0) {
              throw "OnDemand tests failed for $project."
            }
          }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: excel-integration-results-${{ github.run_number }}
          path: '**/TestResults/*.trx'
          if-no-files-found: warn
          retention-days: 14

      - name: Clean up Excel processes
        if: always()
        shell: pwsh
        run: |
          Get-Process Excel -ErrorAction SilentlyContinue |
            ForEach-Object { Stop-Process -Id $_.Id -Force }

  deallocate-runner:
    name: Deallocate Excel runner
    if: always()
    needs: [start-runner, integration-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deallocate VM
        run: >-
          az vm deallocate
          --resource-group "$AZURE_RESOURCE_GROUP"
          --name "$AZURE_VM_NAME"
